<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인생게임 스코어보드</title>
<style>
:root {
  --bg:#080810; --surface:#0f0f1a; --card:#141428;
  --border:#1e1e34; --text:#e4e4f4; --muted:#52527a;
  --font:'Segoe UI','Malgun Gothic',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);}

/* loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;color:var(--muted);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:#FFA502;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.wrap{max-width:1260px;margin:0 auto;padding:28px 20px 60px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:1.5rem;font-weight:800;}
.page-title span{background:linear-gradient(135deg,#FFA502,#E879F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.badge{font-size:.7rem;background:var(--border);color:var(--muted);padding:4px 11px;border-radius:20px;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#2ED573;display:inline-block;margin-right:5px;}
.conn-dot.off{background:#FF4757;}

.phase-nav{display:flex;border:1px solid var(--border);overflow:hidden;margin-bottom:28px;}
.pnav{flex:1;padding:10px;text-align:center;font-size:.82rem;font-weight:700;cursor:pointer;background:transparent;border:none;color:var(--muted);font-family:var(--font);transition:all .2s;position:relative;}
.pnav.active{background:var(--card);color:var(--text);}
.pnav.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#FFA502,#E879F9);}
.pnav:not(:last-child){border-right:1px solid var(--border);}

.slabel{font-size:.68rem;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.pool{display:flex;flex-wrap:wrap;gap:7px;min-height:50px;background:var(--surface);border:1px dashed var(--border);padding:12px;margin-bottom:22px;}
.chip{padding:5px 14px;font-size:.82rem;font-weight:700;cursor:pointer;user-select:none;transition:all .15s;border:2px solid transparent;font-family:var(--font);}
.chip-u{background:var(--card);border-color:var(--border);color:var(--text);}
.chip-u:hover{border-color:#FFA502;color:#FFA502;transform:translateY(-1px);}
.chip-s{background:#FFA502;border-color:#ffd066;color:#000;transform:scale(1.05);}

.setup-teams{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:22px;}
@media(max-width:640px){.setup-teams{grid-template-columns:1fr;}}
.sc{background:var(--surface);border:1px solid var(--border);padding:16px;cursor:default;transition:border-color .2s;}
.sc.drop{border-color:rgba(255,255,255,.3);}
.sc-head{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
.color-pick{width:24px;height:24px;flex-shrink:0;border:2px solid rgba(255,255,255,.2);cursor:pointer;padding:0;background:none;}
.color-pick::-webkit-color-swatch-wrapper{padding:0;}
.color-pick::-webkit-color-swatch{border:none;}
.tni{background:transparent;border:none;color:var(--text);font-family:var(--font);font-size:.9rem;font-weight:800;flex:1;outline:none;border-bottom:1px solid transparent;transition:border-color .2s;}
.tni:focus{border-bottom-color:var(--muted);}
.cnt{font-size:.7rem;color:var(--muted);}
.slots{display:flex;flex-direction:column;gap:5px;}
.slot-row{display:flex;align-items:center;gap:8px;}
.slot-num{font-size:.65rem;font-weight:700;color:var(--muted);width:14px;text-align:right;flex-shrink:0;}
.slot-f{flex:1;padding:5px 12px;font-size:.82rem;font-weight:700;color:#000;cursor:pointer;transition:opacity .15s;font-family:var(--font);}
.slot-f:hover{opacity:.75;}
.slot-e{flex:1;padding:5px 12px;font-size:.78rem;background:var(--card);border:1px dashed var(--border);color:var(--muted);}
.slot-legend{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.sleg{font-size:.75rem;color:var(--muted);}
.setup-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 16px;background:var(--surface);border:1px solid var(--border);}

.btn{padding:8px 18px;border:none;cursor:pointer;font-family:var(--font);font-weight:700;font-size:.82rem;transition:all .18s;}
.btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--text);}
.btn-ghost:hover{border-color:var(--muted);}
.btn-start{background:linear-gradient(135deg,#FFA502,#E879F9);color:#fff;margin-left:auto;padding:9px 26px;font-size:.88rem;}
.btn-start:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(255,165,2,.35);}
.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-danger{background:transparent;border:1px solid #ff475722;color:#FF4757;}
.btn-danger:hover{background:#ff47570f;}
.btn-end{background:linear-gradient(135deg,#ff4757,#c0392b);color:#fff;}
.btn-end:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(255,71,87,.4);}
.btn-resume{background:linear-gradient(135deg,#2ED573,#7effa8);color:#000;}
.btn-resume:hover{transform:translateY(-1px);}
.btn-sm{padding:5px 12px;font-size:.75rem;}
.ended-badge{display:inline-flex;align-items:center;gap:6px;background:#ff47571a;border:1px solid #ff475744;color:#ff6b7a;font-size:.75rem;font-weight:700;padding:4px 12px;letter-spacing:.05em;}

.game-top{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.game-top h2{font-size:1rem;font-weight:700;color:var(--muted);flex:1;}
.rounds-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
@media(max-width:900px){.rounds-wrap{grid-template-columns:1fr;}}
.round-col{background:var(--surface);border:1px solid var(--border);overflow:hidden;}
.round-header{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.round-title{font-size:.82rem;font-weight:800;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;}
.round-body{padding:10px 12px 14px;display:flex;flex-direction:column;gap:6px;}
.prow{background:var(--card);border:1px solid var(--border);padding:10px 12px;}
.prow-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.prow-rank{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:900;flex-shrink:0;}
.pr1{background:#FFD700;color:#000;} .pr2{background:#B8B8B8;color:#000;} .pr3{background:#CD7F32;color:#fff;} .pr4{background:#3a3a3a;color:#fff;}
.prow-name{font-size:.82rem;font-weight:700;flex:1;}
.prow-team{font-size:.65rem;color:var(--muted);}
.prow-money{font-size:1.05rem;font-weight:900;font-variant-numeric:tabular-nums;margin-bottom:8px;}
.inp-wrap{display:flex;align-items:center;gap:4px;}
.mtog{display:flex;border:1px solid var(--border);overflow:hidden;flex-shrink:0;}
.mbtn{padding:3px 7px;font-size:.65rem;font-weight:700;background:transparent;border:none;cursor:pointer;font-family:var(--font);color:var(--muted);transition:all .15s;white-space:nowrap;}
.mbtn.on{background:var(--surface);color:var(--text);}
.ni{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 7px;font-size:.78rem;font-family:var(--font);width:80px;text-align:right;}
.ni:focus{outline:none;border-color:var(--muted);}
.apbtn{padding:4px 8px;border:none;cursor:pointer;font-weight:800;font-size:.74rem;font-family:var(--font);transition:all .15s;white-space:nowrap;}
.ap-p{background:rgba(46,213,115,.15);color:#2ED573;} .ap-p:hover{background:rgba(46,213,115,.3);}
.ap-m{background:rgba(255,71,87,.15);color:#FF4757;} .ap-m:hover{background:rgba(255,71,87,.3);}
.ap-s{background:rgba(255,165,2,.15);color:#FFA502;} .ap-s:hover{background:rgba(255,165,2,.3);}

.totals-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
@media(max-width:640px){.totals-bar{grid-template-columns:repeat(2,1fr);}}
.tot-card{background:var(--surface);border:1px solid var(--border);padding:12px 14px;position:relative;overflow:hidden;}
.tot-rnk{font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.tot-name{font-size:.8rem;font-weight:800;margin-bottom:4px;}
.tot-val{font-size:1.25rem;font-weight:900;font-variant-numeric:tabular-nums;}

.log-section{background:var(--surface);border:1px solid var(--border);padding:16px;margin-bottom:20px;}
.log-list{max-height:160px;overflow-y:auto;}
.lrow{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.76rem;}
.lrow:last-child{border-bottom:none;}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.lwho{font-weight:700;}
.lsub{color:var(--muted);font-size:.7rem;}
.lamt{font-weight:900;font-size:.86rem;margin-left:auto;}
.lamt.p{color:#2ED573;} .lamt.m{color:#FF4757;} .lamt.s{color:#FFA502;}
.lafter{color:var(--muted);font-size:.7rem;}
.ltime{font-size:.67rem;color:var(--muted);}

.ov-box{background:var(--surface);border:1px solid var(--border);padding:16px 18px;}
.ov-url{font-family:'Consolas',monospace;font-size:.76rem;color:#FFA502;background:var(--card);padding:8px 12px;word-break:break-all;border:1px solid var(--border);display:block;margin:7px 0 10px;}
.ov-hint{font-size:.74rem;color:var(--muted);line-height:1.7;}

/* ── OVERLAY ── */
body.ovm{background:transparent !important;}
.ov-stage{width:100vmin;height:100vmin;max-width:600px;max-height:600px;position:relative;overflow:hidden;font-family:'Segoe UI','Malgun Gothic',sans-serif;}
.ov-panel{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:14px;gap:8px;opacity:0;transition:opacity .6s ease;}
.ov-panel.visible{opacity:1;}
.ov-ph{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.ov-ph-title{font-size:1.1rem;font-weight:900;color:rgba(255,255,255,.55);letter-spacing:.1em;text-transform:uppercase;}
.ov-pips{display:flex;gap:5px;margin-left:auto;}
.ov-pip{width:18px;height:4px;background:rgba(255,255,255,.18);}
.ov-pip.on{background:rgba(255,255,255,.75);}
.ov-prow{background:rgba(8,8,24,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:12px 18px;display:flex;align-items:center;gap:14px;border:1px solid rgba(255,255,255,.08);border-left:4px solid;}
.ov-rnum{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;flex-shrink:0;}
.ovr1{background:#FFD700;color:#000;} .ovr2{background:#B8B8B8;color:#000;} .ovr3{background:#CD7F32;color:#fff;} .ovr4{background:#3a3a3a;color:#fff;}
.ov-info{flex:1;min-width:0;}
.ov-pname{font-size:1.25rem;font-weight:800;color:#fff;line-height:1.2;white-space:nowrap;}
.ov-psub{font-size:.82rem;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ov-pmoney{font-size:1.7rem;font-weight:900;font-variant-numeric:tabular-nums;flex-shrink:0;}
.ov-progress{position:absolute;bottom:0;left:0;height:3px;background:rgba(255,255,255,.35);transition:none;}

.ov-final{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:14px;gap:8px;opacity:0;transition:opacity .6s ease;}
.ov-final.visible{opacity:1;}
.ov-fh{display:flex;align-items:center;margin-bottom:2px;}
.ov-fh-title{font-size:1.1rem;font-weight:900;color:rgba(255,255,255,.55);letter-spacing:.1em;text-transform:uppercase;}
.ov-trow{background:rgba(8,8,24,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:12px 18px;display:flex;align-items:center;gap:14px;border:1px solid rgba(255,255,255,.08);border-left:4px solid;}
.ov-trow-rank{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;flex-shrink:0;}
.ov-trow-info{flex:1;min-width:0;}
.ov-trow-members{font-size:1.05rem;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ov-trow-money{font-size:1.7rem;font-weight:900;font-variant-numeric:tabular-nums;flex-shrink:0;}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><div id="loadMsg">Firebase SDK 로딩 중...</div></div></div>

<script>
// SDK 로드 확인
window.addEventListener('load', function() {
  const msg = document.getElementById('loadMsg');
  if (typeof firebase === 'undefined') {
    msg.innerHTML = '❌ Firebase SDK 로드 실패<br><span style="font-size:.75rem;color:#aaa">인터넷 연결을 확인하세요</span>';
    return;
  }
  msg.textContent = 'Firebase 초기화 중...';
});
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAJmePUKepIjsrSLoqLKO9EjhipdnnheaY",
  authDomain: "lifegame-26c6c.firebaseapp.com",
  databaseURL: "https://lifegame-26c6c-default-rtdb.firebaseio.com",
  projectId: "lifegame-26c6c",
  storageBucket: "lifegame-26c6c.firebasestorage.app",
  messagingSenderId: "723913370465",
  appId: "1:723913370465:web:999650fa0d05a9ad39f320"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const STATE_REF = db.ref('game/state');

// 연결 상태 모니터링
const connRef = db.ref('.info/connected');
connRef.on('value', snap => {
  const el = document.getElementById('loadMsg');
  if (el) el.textContent = snap.val() ? 'Firebase 데이터 로딩 중...' : 'Firebase 서버 연결 중...';
});

// 5초 타임아웃
setTimeout(() => {
  if (document.getElementById('loadMsg')) {
    document.getElementById('app').innerHTML =
      '<div class="loading">' +
      '<div style="color:#FF4757;font-size:1.1rem;font-weight:800">⚠️ 연결 시간 초과</div>' +
      '<div style="font-size:.82rem;color:var(--muted);text-align:center;line-height:1.8;margin-top:8px">' +
      'Firebase에 연결할 수 없습니다.<br>' +
      '아래를 확인해주세요:<br>' +
      '① 인터넷 연결 상태<br>' +
      '② Firebase 콘솔 → Realtime Database → 규칙이 <b style="color:#FFA502">true</b>인지<br>' +
      '③ F12 → Console 탭의 빨간 오류 메시지' +
      '</div></div>';
  }
}, 5000);

const MEMBERS = ['천양','코렛트','머독','타요','나나문','한결','카나시','양도끼','카라멜','세노','하카츄','빅토리'];
const DEF_COLORS = ['#FF4757','#2ED573','#FFA502','#E879F9'];
const TN = ['팀 1','팀 2','팀 3','팀 4'];
const isOv = location.search.indexOf('overlay') !== -1;

let state = null;
let sel = null;
let modes = {};
let ovCurrent = 0;
let ovTimer = null;
let ovProgressEl = null;
let myLastSave = 0; // 내가 저장한 updatedAt — Firebase echo 무시용

function defState() {
  return {
    phase: 'setup',
    teams: TN.map((name, i) => ({ id: i, name, color: DEF_COLORS[i], members: [] })),
    unassigned: [...MEMBERS],
    log: [],
    ended: false,
    updatedAt: 0
  };
}

function save() {
  state.updatedAt = Date.now();
  myLastSave = state.updatedAt;
  STATE_REF.set(state);
}

// Firebase는 빈 배열을 null로 반환 → 배열로 복원
function sanitize(s) {
  if (!s) return defState();
  s.unassigned = Array.isArray(s.unassigned) ? s.unassigned : [];
  s.log = Array.isArray(s.log) ? s.log : [];
  if (!Array.isArray(s.teams)) s.teams = defState().teams;
  s.teams.forEach(t => {
    t.members = Array.isArray(t.members) ? t.members : [];
    if (!t.color) t.color = DEF_COLORS[t.id] || '#888';
  });
  if (s.ended === undefined) s.ended = false;
  return s;
}
function fmtD(n) {
  const a = Math.abs(n), sg = n < 0 ? '-' : '';
  return sg + '$' + a.toLocaleString('en-US');
}
function fmtShort(n) {
  const a = Math.abs(n), sg = n < 0 ? '-' : '';
  if (a >= 1000000) return sg + '$' + (a/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (a >= 1000) return sg + '$' + (a/1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return sg + '$' + a.toLocaleString('en-US');
}
function teamTotal(t) { return t.members.reduce((s, m) => s + m.money, 0); }
function getTeamRanks() {
  return [...state.teams].map((t, i) => ({ i, tot: teamTotal(t) }))
    .sort((a, b) => b.tot - a.tot)
    .reduce((r, x, ri) => { r[x.i] = ri + 1; return r; }, {});
}
function roundPlayers(round) {
  return state.teams.flatMap((t, ti) => {
    const m = t.members[round];
    return m ? [{ name: m.name, money: m.money, teamName: t.name, teamColor: t.color, ti, mi: round }] : [];
  });
}
function rankPlayers(players) { return [...players].sort((a, b) => b.money - a.money); }
function getMode(ti, mi) { return modes[ti + '_' + mi] || 'delta'; }
function addLog(ti, mname, amount, after, mode) {
  const t = state.teams[ti];
  state.log.unshift({ ti, teamName: t.name, color: t.color, mname, amount, after, mode,
    time: new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' }) });
  if (state.log.length > 80) state.log.pop();
}

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = state.phase === 'setup' ? renderSetup() : renderGame();
  bind();
}

function renderSetup() {
  const ok = state.unassigned.length === 0;
  const poolHtml = state.unassigned.length
    ? state.unassigned.map(m => `<div class="chip ${sel===m?'chip-s':'chip-u'}" data-member="${m}">${m}</div>`).join('')
    : '<span style="color:var(--muted);font-size:.8rem;align-self:center">✅ 모든 멤버 배정 완료</span>';

  const teamsHtml = state.teams.map((t, i) => {
    const slotsHtml = [0,1,2].map(slot => {
      const m = t.members[slot];
      return `<div class="slot-row"><div class="slot-num">${slot+1}</div>`
        + (m
          ? `<div class="slot-f" style="background:${t.color}" data-rm="${m.name}" data-rft="${i}" data-slot="${slot}">${m.name} ✕</div>`
          : `<div class="slot-e">경기 ${slot+1}</div>`)
        + `</div>`;
    }).join('');
    return `<div class="sc ${sel&&t.members.length<3?'drop':''}" id="sc${i}" data-ti="${i}">
      <div class="sc-head">
        <input type="color" class="color-pick" value="${t.color}" data-ci="${i}">
        <input class="tni" data-tn="${i}" value="${t.name}" maxlength="14">
        <span class="cnt">${t.members.length}/3</span>
      </div>
      <div class="slots">${slotsHtml}</div>
    </div>`;
  }).join('');

  return `<div class="wrap">
    <div class="page-header">
      <div class="page-title">🎲 <span>인생게임</span> 스코어보드</div>
      <span class="badge"><span class="conn-dot" id="connDot"></span>Firebase 연결됨</span>
    </div>
    <div class="phase-nav">
      <div class="pnav active">① 팀 편성</div>
      <div class="pnav" style="cursor:default">② 게임 진행</div>
    </div>
    <div class="slabel">미배정 멤버 (${state.unassigned.length}명)</div>
    <div class="pool">${poolHtml}</div>
    <div class="slot-legend"><div class="sleg">자리 번호 = 경기 번호 &nbsp;·&nbsp; 각 팀 1번끼리 경기1, 2번끼리 경기2, 3번끼리 경기3</div></div>
    <div class="setup-teams">${teamsHtml}</div>
    <div class="setup-actions">
      <button class="btn btn-ghost" id="btnReset">초기화</button>
      <button class="btn btn-start" id="btnStart" ${ok?'':'disabled'}>${ok?'게임 시작 →':state.unassigned.length+'명 미배정'}</button>
    </div>
    ${renderOvBox()}
  </div>`;
}

function renderGame() {
  const teamRanks = getTeamRanks();
  const rkL = ['🥇','🥈','🥉','4위'];
  const rkC = {1:'#FFD700',2:'#B8B8B8',3:'#CD7F32',4:'#666'};
  const roundNames = ['경기 1','경기 2','경기 3'];

  const totHtml = state.teams.map((t, i) => {
    const r = teamRanks[i], tot = teamTotal(t);
    return `<div class="tot-card" style="border-top:2px solid ${t.color}">
      <div class="tot-rnk" style="color:${rkC[r]}">${rkL[r-1]} 팀 순위</div>
      <div class="tot-name" style="color:${t.color}">${t.name}</div>
      <div class="tot-val" style="color:${t.color}">${fmtD(tot)}</div>
    </div>`;
  }).join('');

  const roundsHtml = [0,1,2].map(round => {
    const players = roundPlayers(round);
    const ranked = rankPlayers(players);
    const rowsHtml = ranked.map((p, ri) => {
      const isDelta = getMode(p.ti, p.mi) === 'delta';
      return `<div class="prow">
        <div class="prow-top">
          <div class="prow-rank pr${ri+1}">${ri+1}</div>
          <div class="prow-name">${p.name}</div>
          <div class="prow-team" style="color:${p.teamColor}">${p.teamName}</div>
        </div>
        <div class="prow-money" style="color:${p.teamColor}">${fmtD(p.money)}</div>
        <div class="inp-wrap">
          <div class="mtog">
            <button class="mbtn ${isDelta?'on':''}" data-mode="delta" data-ti="${p.ti}" data-mi="${p.mi}">증감</button>
            <button class="mbtn ${!isDelta?'on':''}" data-mode="set" data-ti="${p.ti}" data-mi="${p.mi}">설정</button>
          </div>
          <input class="ni" id="inp${p.ti}_${p.mi}" type="number" step="1" placeholder="${isDelta?'$증감액':'$금액'}">
          ${isDelta
            ? `<button class="apbtn ap-p" data-act="plus" data-ti="${p.ti}" data-mi="${p.mi}">+</button>
               <button class="apbtn ap-m" data-act="minus" data-ti="${p.ti}" data-mi="${p.mi}">−</button>`
            : `<button class="apbtn ap-s" data-act="set" data-ti="${p.ti}" data-mi="${p.mi}">적용</button>`}
        </div>
      </div>`;
    }).join('');
    return `<div class="round-col">
      <div class="round-header">
        <div class="round-title">${roundNames[round]}</div>
        <span style="font-size:.7rem;color:var(--muted)">${players.map(p=>p.name).join(' · ')}</span>
      </div>
      <div class="round-body">${rowsHtml}</div>
    </div>`;
  }).join('');

  const logHtml = state.log.length === 0
    ? '<div style="color:var(--muted);font-size:.78rem;text-align:center;padding:12px">거래 내역이 없습니다</div>'
    : state.log.map(l => {
        const isSet = l.mode === 'set';
        const cls = isSet ? 's' : (l.amount >= 0 ? 'p' : 'm');
        const disp = isSet ? ('→ ' + fmtD(l.after)) : ((l.amount >= 0 ? '+' : '') + fmtShort(l.amount));
        return `<div class="lrow">
          <div class="ldot" style="background:${l.color}"></div>
          <div class="lwho">${l.teamName}</div>
          <div class="lsub">· ${l.mname}</div>
          <div class="lamt ${cls}">${disp}</div>
          <div class="lafter">잔액 ${fmtD(l.after)}</div>
          <div class="ltime">${l.time}</div>
        </div>`;
      }).join('');

  const endBtn = state.ended
    ? `<span class="ended-badge">🏁 게임 종료</span><button class="btn btn-resume btn-sm" id="btnResume">▶ 게임 재개</button>`
    : `<button class="btn btn-end btn-sm" id="btnEnd">🏁 게임 종료</button>`;

  return `<div class="wrap">
    <div class="page-header">
      <div class="page-title">🎲 <span>인생게임</span> 스코어보드</div>
      <span class="badge"><span class="conn-dot" id="connDot"></span>Firebase 연결됨</span>
    </div>
    <div class="phase-nav">
      <div class="pnav" id="goSetup">① 팀 편성</div>
      <div class="pnav active">② 게임 진행</div>
    </div>
    <div class="game-top">
      <h2>경기별 금액 관리</h2>
      <button class="btn btn-ghost btn-sm" id="btnResetMoney">금액 초기화</button>
      <button class="btn btn-danger btn-sm" id="btnFull">전체 초기화</button>
      ${endBtn}
    </div>
    <div class="totals-bar">${totHtml}</div>
    <div class="rounds-wrap">${roundsHtml}</div>
    <div class="log-section">
      <div class="slabel" style="margin-bottom:10px">거래 내역</div>
      <div class="log-list">${logHtml}</div>
    </div>
    ${renderOvBox()}
  </div>`;
}

function renderOvBox() {
  const url = location.href.split('?')[0] + '?overlay';
  return `<div class="ov-box">
    <div class="slabel" style="margin-bottom:5px">🎬 OBS / 프릭샷 오버레이</div>
    <div class="ov-hint">아래 URL을 OBS 브라우저 소스에 붙여넣으세요. 정사각형 권장 (600×600).<br>
    Firebase 실시간 연동 — 스코어보드 수정이 즉시 반영됩니다.</div>
    <code class="ov-url" id="ovUrl">${url}</code>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-ghost btn-sm" id="btnCopy">📋 URL 복사</button>
      <button class="btn btn-ghost btn-sm" id="btnPreview">🔗 미리보기</button>
    </div>
  </div>`;
}

// ── BIND ─────────────────────────────────────────────────────────
function bind() {
  const $ = id => document.getElementById(id);
  const on = (id, fn) => { const el = $(id); if (el) el.addEventListener('click', fn); };

  document.querySelectorAll('[data-member]').forEach(el => {
    el.addEventListener('click', () => { sel = (sel === el.dataset.member) ? null : el.dataset.member; render(); });
  });

  document.querySelectorAll('[id^="sc"]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.dataset.rm) return;
      if (!sel) return;
      const ti = parseInt(el.dataset.ti), t = state.teams[ti];
      if (t.members.length >= 3) return;
      t.members.push({ name: sel, money: 0 });
      state.unassigned = state.unassigned.filter(x => x !== sel);
      sel = null; save(); render();
    });
  });

  document.querySelectorAll('[data-rm]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const ti = parseInt(el.dataset.rft), nm = el.dataset.rm;
      state.teams[ti].members = state.teams[ti].members.filter(m => m.name !== nm);
      state.unassigned.push(nm);
      save(); render();
    });
  });

  document.querySelectorAll('.color-pick').forEach(el => {
    el.addEventListener('click', e => e.stopPropagation());
    el.addEventListener('input', e => {
      e.stopPropagation();
      const ti = parseInt(el.dataset.ci);
      state.teams[ti].color = el.value;
      // 슬롯 색만 즉시 업데이트 (picker 닫히지 않도록)
      const card = $('sc' + ti);
      if (card) card.querySelectorAll('.slot-f').forEach(sf => sf.style.background = el.value);
    });
    el.addEventListener('change', e => {
      e.stopPropagation();
      state.teams[parseInt(el.dataset.ci)].color = el.value;
      save(); render();
    });
  });

  document.querySelectorAll('.tni').forEach(el => {
    el.addEventListener('input', () => { state.teams[parseInt(el.dataset.tn)].name = el.value; save(); });
    el.addEventListener('click', e => e.stopPropagation());
  });

  on('btnReset', () => { if (confirm('팀 편성을 초기화할까요?')) { state = defState(); sel = null; modes = {}; save(); render(); } });
  on('btnStart', () => { state.phase = 'game'; state.log = []; save(); render(); });
  on('goSetup',  () => { state.phase = 'setup'; save(); render(); });
  on('btnResetMoney', () => {
    if (confirm('모든 멤버의 금액을 $0으로 초기화할까요?')) {
      state.teams.forEach(t => t.members.forEach(m => m.money = 0));
      state.log = []; save(); render();
    }
  });
  on('btnFull', () => { if (confirm('전체 초기화하시겠습니까?')) { state = defState(); sel = null; modes = {}; save(); render(); } });
  on('btnEnd',  () => { if (confirm('게임을 종료할까요? 오버레이가 최종 팀 순위로 전환됩니다.')) { state.ended = true; save(); render(); } });
  on('btnResume', () => { state.ended = false; save(); render(); });

  document.querySelectorAll('[data-mode]').forEach(el => {
    el.addEventListener('click', () => {
      const ti = parseInt(el.dataset.ti), mi = parseInt(el.dataset.mi);
      modes[ti+'_'+mi] = el.dataset.mode;
      const inp = $('inp'+ti+'_'+mi); if (inp) inp.value = '';
      render();
    });
  });

  document.querySelectorAll('[data-act]').forEach(el => {
    el.addEventListener('click', () => {
      const ti = parseInt(el.dataset.ti), mi = parseInt(el.dataset.mi);
      const inp = $('inp'+ti+'_'+mi);
      const raw = parseFloat(inp?.value);
      if (!inp || isNaN(raw)) return;
      const m = state.teams[ti].members[mi];
      const act = el.dataset.act;
      let amount, mode;
      if (act === 'set') {
        const v = Math.round(raw); amount = v - m.money; m.money = v; mode = 'set';
      } else {
        const delta = Math.round(raw) * (act === 'plus' ? 1 : -1);
        m.money += delta; amount = delta; mode = 'delta';
      }
      addLog(ti, m.name, amount, m.money, mode);
      inp.value = ''; save(); render();
    });
  });

  document.querySelectorAll('.ni').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const [ti, mi] = inp.id.replace('inp','').split('_').map(Number);
      const act = getMode(ti, mi) === 'set' ? 'set' : 'plus';
      document.querySelector(`[data-act="${act}"][data-ti="${ti}"][data-mi="${mi}"]`)?.click();
    });
  });

  on('btnCopy', () => {
    const url = $('ovUrl')?.textContent;
    navigator.clipboard?.writeText(url).then(() => {
      const b = $('btnCopy'); if (b) { b.textContent = '✅ 복사됨'; setTimeout(() => b.textContent = '📋 URL 복사', 1500); }
    });
  });
  on('btnPreview', () => { window.open($('ovUrl')?.textContent, '_blank', 'width=620,height=620'); });
}

// ── OVERLAY ──────────────────────────────────────────────────────
function renderOverlay() {
  document.body.classList.add('ovm');
  const app = document.getElementById('app');
  const rkBg  = {1:'#FFD700',2:'#B8B8B8',3:'#CD7F32',4:'#3a3a3a'};
  const rkTxt = {1:'#000',  2:'#000',  3:'#fff',  4:'#fff'};

  if (state.ended) {
    if (ovTimer) { clearInterval(ovTimer); ovTimer = null; }
    const sorted = state.teams.map(t => ({ ...t, tot: teamTotal(t) }))
      .sort((a, b) => b.tot - a.tot);

    app.innerHTML = `<div class="ov-stage"><div class="ov-final visible">
      <div class="ov-fh"><div class="ov-fh-title">최종 팀 순위</div></div>
      ${sorted.map((t, ri) => `
        <div class="ov-trow" style="border-left-color:${t.color}">
          <div class="ov-trow-rank ovr${ri+1}" style="background:${rkBg[ri+1]};color:${rkTxt[ri+1]}">${ri+1}</div>
          <div class="ov-trow-info">
            <div class="ov-trow-members" style="color:${t.color}">${t.members.map(m=>m.name).join(' · ')}</div>
          </div>
          <div class="ov-trow-money" style="color:${t.color}">${fmtD(t.tot)}</div>
        </div>`).join('')}
    </div></div>`;
    return;
  }

  const roundNames = ['경기 1','경기 2','경기 3'];
  const panelsHtml = [0,1,2].map(round => {
    const ranked = rankPlayers(roundPlayers(round));
    const pipsHtml = [0,1,2].map(i => `<div class="ov-pip${i===round?' on':''}"></div>`).join('');
    const rowsHtml = ranked.map((p, ri) => {
      const others = state.teams[p.ti].members.filter((_, idx) => idx !== p.mi).map(m => m.name).join(' · ');
      return `<div class="ov-prow" style="border-left-color:${p.teamColor}">
        <div class="ov-rnum ovr${ri+1}" style="background:${rkBg[ri+1]};color:${rkTxt[ri+1]}">${ri+1}</div>
        <div class="ov-info">
          <div class="ov-pname">${p.name}</div>
          <div class="ov-psub" style="color:${p.teamColor}">${others}</div>
        </div>
        <div class="ov-pmoney" style="color:${p.teamColor}">${fmtD(p.money)}</div>
      </div>`;
    }).join('');
    return `<div class="ov-panel" id="ovp${round}">
      <div class="ov-ph"><div class="ov-ph-title">${roundNames[round]}</div>
      <div class="ov-pips">${pipsHtml}</div></div>
      ${rowsHtml}
    </div>`;
  }).join('');

  app.innerHTML = `<div class="ov-stage">${panelsHtml}
    <div id="ovProgress" class="ov-progress" style="width:0%"></div>
  </div>`;

  ovProgressEl = document.getElementById('ovProgress');
  showOvPanel(ovCurrent);
  if (ovTimer) clearInterval(ovTimer);
  ovTimer = setInterval(() => { ovCurrent = (ovCurrent + 1) % 3; showOvPanel(ovCurrent); }, 5000);
}

function showOvPanel(idx) {
  document.querySelectorAll('.ov-panel').forEach((p, i) => p.classList.toggle('visible', i === idx));
  if (ovProgressEl) {
    ovProgressEl.style.transition = 'none';
    ovProgressEl.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      ovProgressEl.style.transition = 'width 5s linear';
      ovProgressEl.style.width = '100%';
    }));
  }
}

// ── FIREBASE LISTENER ────────────────────────────────────────────
STATE_REF.on('value', snapshot => {
  const incoming = sanitize(snapshot.val());

  if (!isOv && incoming.updatedAt === myLastSave && state !== null) return;

  state = incoming;

  if (isOv) {
    renderOverlay();
  } else {
    render();
  }
}, error => {
  console.error('Firebase error:', error);
  document.getElementById('app').innerHTML =
    '<div class="loading"><div style="color:#FF4757">Firebase 연결 실패</div><div style="font-size:.8rem;color:var(--muted)">' + error.message + '</div></div>';
});
</script>
